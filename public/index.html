    <h1>Timely MCP server</h1>
    <p>This is a private remote <a href="https://modelcontextprotocol.io">MCP</a> server for UBCab Holding, wrapping the Timely.mn attendance API.</p>
    <p>The MCP endpoint is <code>POST /mcp</code> and requires a bearer token. There is nothing to see here.</p>
    <p class="muted">If you are configuring a client, point it at <code>/mcp</code> with header <code>Authorization: Bearer &lt;token&gt;</code>.</p>
